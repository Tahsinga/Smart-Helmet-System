<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Worker History - Smart Helmet</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Roboto', sans-serif; }
    input, select, textarea, .form-control { font-family: 'Roboto', sans-serif; font-size: 0.9rem; }
  </style>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <style>
    .card { border:0; border-radius:14px; }
    .shadow-sm { box-shadow: 0 10px 25px rgba(0,0,0,0.06) !important; }
    #miniMap { height: 260px; border-radius: 12px; }
  </style>
</head>

<body class="bg-light">
  <div class="container-fluid py-3">
    <div class="d-flex align-items-center justify-content-between mb-3">
      <div>
        <h3 class="m-0">{{ helmet.worker.name }}</h3>
        <div class="text-muted small">
          Helmet: <strong>{{ helmet.device_id }}</strong> · Employee: <strong>{{ helmet.worker.employee_id }}</strong>
        </div>
      </div>
      <div class="d-flex gap-2">
        <a class="btn btn-outline-secondary" href="/api/workers/">Workers</a>
        <a class="btn btn-outline-secondary" href="/api/dashboard/">Dashboard</a>
        <a class="btn btn-outline-danger" href="/logout/">Logout</a>
      </div>
    </div>

    <div class="row g-3">
      <div class="col-lg-4">
        <div class="card shadow-sm">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-center">
              <h5 class="m-0">Latest Location</h5>
              <select class="form-select form-select-sm" id="rangeSelect" style="width:auto;">
                <option value="15">Last 15 min</option>
                <option value="60" selected>Last 60 min</option>
                <option value="180">Last 3 hours</option>
                <option value="720">Last 12 hours</option>
              </select>
            </div>
            <div class="mt-2" id="miniMap"></div>

            <div class="mt-3 small">
              <div><strong>Gas:</strong> <span id="latestGas">—</span></div>
              <div><strong>Heart Rate:</strong> <span id="latestHR">—</span></div>
              <div><strong>Motion:</strong> <span id="latestMotion">—</span></div>
              <div><strong>Temperature:</strong> <span id="latestTemp">—</span></div>
              <div class="text-muted"><strong>Time:</strong> <span id="latestTime">—</span></div>
            </div>
          </div>
        </div>
      </div>

      <div class="col-lg-8">
        <div class="card shadow-sm mb-3">
          <div class="card-body">
            <h5 class="card-title">Gas Level</h5>
            <canvas id="gasChart"></canvas>
          </div>
        </div>

        <div class="card shadow-sm mb-3">
          <div class="card-body">
            <h5 class="card-title">Heart Rate</h5>
            <canvas id="hrChart"></canvas>
          </div>
        </div>

        <div class="card shadow-sm">
          <div class="card-body">
            <h5 class="card-title">Motion</h5>
            <canvas id="motionChart"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const DEVICE_ID = "{{ helmet.device_id }}";
    const DATA_URL = `/api/workers/${DEVICE_ID}/history/`;

    // Mini map
    const miniMap = L.map("miniMap", { scrollWheelZoom: true, zoomControl: true })
      .setView([-17.8252, 31.0335], 12);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { maxZoom: 19 }).addTo(miniMap);

    let marker = L.marker([-17.8252, 31.0335]).addTo(miniMap);

    // Charts
    function makeChart(canvasId, label, unit) {
  const ctx = document.getElementById(canvasId);
  return new Chart(ctx, {
    type: "line",
    data: { labels: [], datasets: [{ label: `${label} (${unit})`, data: [] }] },
    options: {
      responsive: true,
      animation: false,
      scales: {
        x: { ticks: { maxTicksLimit: 8 } },
        y: {
          min: 0,
          ticks: {
            stepSize: 5
          },
          title: {
            display: true,
            text: `${label} (${unit})`
          }
        }
      },
      plugins: {
        tooltip: {
          callbacks: {
            label: function(context) {
              return `${context.dataset.label}: ${context.raw} ${unit}`;
            }
          }
        }
      }
    }
  });
}


    const gasChart = makeChart("gasChart", "Gas Level", "ppm");
const hrChart = makeChart("hrChart", "Heart Rate", "bpm");
const motionChart = makeChart("motionChart", "Motion", "m/s²");


    function setLatest(latest) {
      if (!latest) return;

      document.getElementById("latestGas").textContent = `${Number(latest.gas).toFixed(1)} ppm`;
document.getElementById("latestHR").textContent = `${latest.hr} bpm`;
document.getElementById("latestMotion").textContent = `${Number(latest.motion).toFixed(1)} m/s²`;
document.getElementById("latestTemp").textContent = `${Number(latest.temp).toFixed(1)} °C`;


      marker.setLatLng([latest.lat, latest.lng]);
      miniMap.setView([latest.lat, latest.lng], 14);
    }

    function setChart(chart, labels, values) {
      chart.data.labels = labels;
      chart.data.datasets[0].data = values;
      chart.update();
    }

    async function loadHistory(minutes) {
      const res = await fetch(`${DATA_URL}?minutes=${minutes}`, { cache: "no-store" });
      const data = await res.json();

      const labels = data.points.map(p => new Date(p.t).toLocaleTimeString());
      setChart(gasChart, labels, data.points.map(p => p.gas));
      setChart(hrChart, labels, data.points.map(p => p.hr));
      setChart(motionChart, labels, data.points.map(p => p.motion));

      setLatest(data.latest);
    }

    const rangeSelect = document.getElementById("rangeSelect");
    rangeSelect.addEventListener("change", () => loadHistory(rangeSelect.value));

    // initial load + refresh every 10s
    loadHistory(rangeSelect.value);
    setInterval(() => loadHistory(rangeSelect.value), 10000);
  </script>
</body>
</html>

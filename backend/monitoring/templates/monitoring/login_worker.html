<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Worker Login · Smart Helmet</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      font-family: 'Roboto', sans-serif;
      background: url('https://images.unsplash.com/photo-1548705085-101177834f47?q=80&w=1032&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D') no-repeat center center fixed;
      background-size: cover;
      color: #e2e8f0;
    }
    .page-shell {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .login-card {
      width: 100%;
      max-width: 460px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 10px;
      background: rgba(15, 23, 42, 0.96);
      box-shadow: 0 32px 80px rgba(15, 23, 42, 0.35);
      opacity: 0.95;
    }
    .login-card-body {
      padding: 2.5rem;
      opacity: 1;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      justify-content: center;
    }
    .brand-dot {
      width: 10px;
      height: 10px;
      border-radius: 5px;
      background: #38bdf8;
    }
    h1 {
      margin-bottom: 0.35rem;
      font-size: 1.9rem;
      color: #f8fafc;
    }
    .subtitle {
      color: #94a3b8;
      margin-bottom: 1.75rem;
      line-height: 1.6;
    }
    label {
      font-weight: 600;
      color: #cbd5e1;
    }
    input {
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid #334155;
      color: #e2e8f0;
      border-radius: 5px;
      padding: 0.95rem 1rem;
      width: 100%;
      max-height: 48px;
      font-size: 0.9rem;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    input:focus {
      outline: none;
      border-color: #38bdf8;
      box-shadow: 0 0 0 0.2rem rgba(56, 189, 248, 0.2);
      background: rgba(15, 23, 42, 1);
    }
    .btn-submit {
      border-radius: 5px;
      padding: 0.95rem 1rem;
      font-weight: 700;
    }
    .link-row {
      margin-top: 1.5rem;
      text-align: center;
    }
    .link-row a {
      color: #7dd3fc;
      text-decoration: none;
    }
    .link-row a:hover {
      color: #38bdf8;
    }
    .alert {
      border-radius: 5px;
      padding: 1rem 1.25rem;
      background: rgba(34, 211, 238, 0.12);
      border: 1px solid rgba(56, 189, 248, 0.3);
      color: #dbeafe;
      margin-bottom: 1.25rem;
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <div class="login-card">
      <div class="login-card-body">
        <div class="brand">
          <span class="brand-dot"></span>
          <span class="text-white">Smart Helmet System</span>
        </div>
        {% if form.errors %}
          <div class="alert">
            <strong>Login failed</strong>
            <p class="mb-0">Please check your username and password.</p>
          </div>
        {% endif %}

        <form method="post" novalidate>
          {% csrf_token %}
          <div class="mb-4">
            <label for="id_username">Username</label>
            {{ form.username }}
          </div>
          <div class="mb-4">
            <label for="id_password">Password</label>
            {{ form.password }}
          </div>
          <button class="btn btn-primary btn-submit w-100" type="submit">Continue to dashboard</button>
        </form>

        <div class="link-row">
          <span>Need admin access?</span>
          <br />
          <a href="{% url 'admin_login' %}">Switch to admin login</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
